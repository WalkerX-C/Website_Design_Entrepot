<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>User Login</title>
        <link rel="stylesheet" href="login_style.css">
    </head>

    <body>
        <div class="top-header-section">
            <h1 id="text">Welcome Back to MY Store</h1>
            <a href="homepage.html" class="logo"><img src="home.png" alt="Logo"></a>
        </div>

        <div class="form-card-container">
            <div class="form-card">
                <h1>User Login</h1>
                <form id="loginForm" onsubmit="return validateLogin()" onreset="resetLogin()">
                    
                    <div class="form-group">
                        <label>Username:</label>
                        <input type="text" id="loginUsername" name="username" onblur="checkLoginUsername()">
                        <p class="error-message" id="loginUsernameError"></p>
                    </div>

                    <div class="form-group">
                        <label>Password:</label>
                        <input type="password" id="loginPassword" name="password" onblur="checkLoginPassword()">
                        <p class="error-message" id="loginPasswordError"></p>
                    </div>
                    
                    <div class="form-buttons">
                        <input type="submit" value="Login">
                        <input type="reset" value="Reset">
                    </div>

                    <div class="form-links">
                        <p>Don't have an account? <a href="seller_registration.html">Register here</a></p>
                    </div>
                </form>
            </div>
        </div>

        <script src="login.js"></script>
    </body>

    <div class="footer">
        <p>2026 All rights reserved.</p>
    </div>
</html>
