<!DOCTYPE html>
<html lang="en">
<head>
    <title>MY Store - Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="module_custom.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="layout-group" style="justify-content: center; margin-top: 60px;">
            <div class="display-unit" style="text-align: center;">
                <a href="homepage.html" style="background: white; padding: 10px; border-radius: 50%; display: inline-block;">
                    <img src="icon.png" alt="Logo" width="60">
                </a>
            </div>
        </div>

        <div class="layout-group" style="justify-content: center;">
            <div class="display-unit" style="max-width: 500px;">
                <div class="premium-card" style="text-align: center;">
                    <h1 class="accent-blue" style="font-size: 32px; margin-bottom: 10px;">Create Account</h1>
                    <p style="color: #888; margin-bottom: 30px;">Join MY Store today.</p>
                    
                    <form id="registerForm" style="display: flex; flex-direction: column;">
                        <input type="text" id="regUser" class="modern-input" placeholder="Choose a Username" required>
                        <input type="email" id="regEmail" class="modern-input" placeholder="Email Address" required>
                        <input type="password" id="regPass" class="modern-input" placeholder="Password" required>
                        <input type="password" id="regConfirm" class="modern-input" placeholder="Confirm Password" required>
                        <button type="submit" class="action-btn">Sign Up</button>
                    </form>
                    
                    <div style="margin-top: 25px; font-size: 14px;">
                        <span style="color: #666;">Already have an account? </span>
                        <a href="login.html" style="color: var(--brand-main); text-decoration: none; font-weight: bold;">Sign In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
