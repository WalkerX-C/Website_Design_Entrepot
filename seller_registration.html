<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Seller Registration</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="top-header-section">
            <div class="header-content-flex">
                <h1 id="text">Welcome to MY Store</h1>
                <a href="homepage.html" class="logo"><img src="home.png" alt="Logo"></a>
            </div>
        </div>

        <div class="form-card-container">
            <div class="form-card">
                <h1>Create your account</h1>
                <form id="registrationForm" novalidate>
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Please ent" required>
                        <p class="error-message" id="nameError"></p>
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Please ent" required>
                        <p class="error-message" id="emailError"></p>
                    </div>

                    <div class="form-group">
                        <label for="address">Address:</label>
                        <input type="text" id="address" name="address" placeholder="Please ent" required>
                        <p class="error-message" id="addressError"></p>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone:</label>
                        <input type="tel" id="phone" name="phone" placeholder="Please ent" required>
                        <p class="error-message" id="phoneError"></p>
                    </div>

                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" placeholder="Please ent" required>
                        <p class="error-message" id="usernameError"></p>
                    </div>

                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Please ent" required>
                        <p class="error-message" id="passwordError"></p>
                    </div>
                    
                    <div class="form-buttons">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </div>
                </form>
            </div>
        </div>

        <script src="script.js"></script>
    </body>

    <footer>
        <p>&copy; 2026 All rights reserved.</p>
    </footer>
</html>
