<!DOCTYPE html>
<html lang="en">
<head>
    <title>MY Store - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="module_custom.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="layout-group auth-hero-row">
            <div class="display-unit auth-hero-unit">
                <a href="homepage.html" class="auth-logo-link">
                    <img src="icon.png" alt="Logo" width="60">
                </a>
            </div>
        </div>

        <div class="layout-group auth-main-row">
            <div class="display-unit auth-narrow">
                <div class="premium-card auth-card">
                    <h1 class="accent-blue auth-title">Sign in to MY Store</h1>
                    <p class="auth-lead">Enter your details below.</p>

                    <form id="loginForm" class="auth-form">
                        <input type="text" id="loginUser" class="modern-input" placeholder="Username" required>
                        <input type="password" id="loginPass" class="modern-input" placeholder="Password" required>
                        <button type="submit" class="action-btn">Sign In</button>
                    </form>

                    <div class="auth-footer">
                        <a href="#" class="auth-muted-link">Forgot password?</a>
                        <span class="auth-divider">|</span>
                        <a href="register.html" class="auth-accent-link">Create account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
