<!DOCTYPE html>
<html lang="en">
<head>
    <title>MY Store - Search</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="module_custom.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="layout-group" style="align-items: center; padding: 20px 0;">
            <div class="display-unit" style="flex: 1;">
                <h1 style="font-size: clamp(32px, 5vw, 64px); margin: 0;">Search</h1>
            </div>
            <div class="display-unit" style="flex: 0 0 auto;">
                <a href="homepage.html" style="background: white; padding: 8px; border-radius: 50%; display: inline-block;">
                    <img src="icon.png" alt="Logo" width="45">
                </a>
            </div>
        </div>

        <div class="layout-group" style="margin-bottom: 30px;">
            <div class="display-unit" style="width: 100%;">
                <nav style="background: white; border-radius: 15px; text-align: center; padding: 10px; box-shadow: var(--card-shadow);">
                    <a href="homepage.html" style="padding: 10px 20px; text-decoration: none; color: #333;">HomePage</a>
                    <a href="search.html" style="padding: 10px 20px; text-decoration: none; color: #333; font-weight: bold;">Search</a>
                    <a href="sell.html" style="padding: 10px 20px; text-decoration: none; color: #333;">Seller Page</a>
                    <a href="aboutus.html" style="padding: 10px 20px; text-decoration: none; color: #333;">About Us</a>
                </nav>
            </div>
        </div>

        <div class="layout-group">
            <div class="display-unit">
                <div class="premium-card" style="text-align: center; padding: 50px;">
                    <h2 class="accent-blue" style="margin-bottom: 25px;">What are you looking for?</h2>
                    <div style="display: flex; gap: 15px; max-width: 800px; margin: 0 auto;">
                        <input type="text" id="userSearchInput" class="modern-input" placeholder="Search laptops, phones..." style="margin-bottom: 0;">
                        <button class="action-btn" onclick="performSearch()" style="padding: 0 40px;">GO</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="layout-group" style="margin-top: 40px;">
            <div class="display-unit">
                <h2 style="font-size: 30px;">Results. <span style="color: #ccc; font-weight: normal;">Find the best deals.</span></h2>
            </div>
        </div>

        <div class="layout-group" id="searchResults">
            <div class="display-unit" style="width: 100%;">
                <p style="text-align:center; color:#999; padding: 40px;">Type something above to start searching.</p>
            </div>
        </div>
    </div>

    <script src="search.js"></script>
</body>
</html>
